<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#8549ba">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PMP Quest">
<meta name="description" content="PMP exam prep with spaced repetition, glossary, scenarios, and domain analytics">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>PMP Quest</title>
<style>
:root{--purple:#8549ba;--purple-light:#f0e6ff;--purple-dark:#5a2d82;--green:#58cc02;--green-light:#f0ffe0;--green-dark:#2d6e00;--red:#ff4b4b;--red-light:#fff0f0;--red-dark:#8b0000;--amber:#e07000;--amber-light:#faeeda;--teal:#1D9E75;--blue:#185fa5;--bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe8;--text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--radius:12px;--radius-sm:8px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#252525;--bg3:#2f2f2f;--text:#f0f0f0;--text2:#aaaaaa;--text3:#707070;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);--purple-light:#2d1f45;--green-light:#1a2e10;--red-light:#2e1010;--amber-light:#2e2010;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;}
#app{height:100vh;overflow-y:auto;overflow-x:hidden;padding:calc(var(--safe-top) + 12px) 16px calc(var(--safe-bottom) + 72px);-webkit-overflow-scrolling:touch;}
/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:.25rem 0 1rem;gap:8px;}
.pill{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:var(--text2);}
.pill .v{font-size:13px;font-weight:500;color:var(--text);}
/* PROGRESS */
.pbar-w{background:var(--bg2);border-radius:99px;height:8px;margin-bottom:1.25rem;overflow:hidden;}
.pbar{height:8px;border-radius:99px;background:var(--purple);transition:width .4s ease;}
/* CARDS */
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:1.125rem 1.25rem;margin-bottom:.875rem;}
.qtag{font-size:11px;font-weight:500;color:var(--purple);background:var(--purple-light);border-radius:6px;padding:3px 9px;display:inline-block;margin-bottom:6px;}
.ptag{font-size:11px;font-weight:500;color:#0c447c;background:#e6f1fb;border-radius:6px;padding:3px 9px;display:inline-block;margin-bottom:6px;margin-left:4px;}
.btag{font-size:11px;font-weight:500;color:#27500a;background:#eaf3de;border-radius:6px;padding:3px 9px;display:inline-block;margin-bottom:6px;margin-left:4px;}
.stag{font-size:11px;font-weight:500;color:#533d00;background:var(--amber-light);border-radius:6px;padding:3px 9px;display:inline-block;margin-bottom:6px;margin-left:4px;}
.sr-tag{font-size:11px;font-weight:500;border-radius:6px;padding:3px 9px;display:inline-block;margin-bottom:6px;margin-left:4px;}
.sr-new{background:#e6f0ff;color:#0a3f8f;}.sr-review{background:var(--amber-light);color:#633806;}.sr-hard{background:var(--red-light);color:var(--red-dark);}.sr-mastered{background:var(--green-light);color:var(--green-dark);}
.qtext{font-size:16px;line-height:1.6;color:var(--text);font-weight:500;}
.scenario-box{background:var(--bg2);border-left:3px solid var(--purple);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:.75rem 1rem;margin-bottom:.75rem;font-size:13px;line-height:1.6;color:var(--text2);}
/* OPTIONS */
.opts{display:grid;gap:9px;margin-bottom:.875rem;}
.opt{background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--radius);padding:13px 14px;text-align:left;font-size:15px;color:var(--text);cursor:pointer;transition:border-color .12s,background .12s,transform .08s;display:flex;align-items:flex-start;gap:10px;width:100%;-webkit-appearance:none;}
.opt:active:not(:disabled){transform:scale(.98);}
.opt.sel{border-color:var(--purple);background:var(--purple-light);color:var(--purple-dark);font-weight:500;}
.opt.cor{border-color:var(--green);background:var(--green-light);color:var(--green-dark);}
.opt.inc{border-color:var(--red);background:var(--red-light);color:var(--red-dark);}
.opt:disabled{cursor:default;}
.oltr{font-size:12px;font-weight:500;background:var(--bg2);border-radius:6px;width:24px;height:24px;min-width:24px;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.opt.sel .oltr{background:#dcc8f7;color:var(--purple-dark);}.opt.cor .oltr{background:#c6f0a0;color:var(--green-dark);}.opt.inc .oltr{background:#ffc5c5;color:var(--red-dark);}
/* FEEDBACK */
.fb{border-radius:var(--radius);padding:.875rem 1rem;margin-bottom:.875rem;font-size:14px;line-height:1.55;}
.fb.cor{background:var(--green-light);border:1px solid var(--green);color:var(--green-dark);}
.fb.inc{background:var(--red-light);border:1px solid var(--red);color:var(--red-dark);}
.fb-hd{font-weight:500;font-size:15px;margin-bottom:4px;}
/* BUTTONS */
.abtn{width:100%;padding:14px;border-radius:var(--radius);font-size:16px;font-weight:500;border:none;cursor:pointer;transition:opacity .15s,transform .1s;}
.abtn:active{transform:scale(.98);}
.abtn.pur{background:var(--purple);color:white;}.abtn.grn{background:var(--green);color:white;}.abtn.red{background:var(--red);color:white;}.abtn.amb{background:var(--amber);color:white;}.abtn.blue{background:var(--blue);color:white;}.abtn.teal{background:var(--teal);color:white;}.abtn.out{background:transparent;border:1.5px solid var(--border2);color:var(--text);}
.abtn:disabled{background:var(--bg2);color:var(--text3);cursor:default;}
.btn-row{display:grid;gap:9px;}
/* TIMER / ERROR */
.tmr{display:flex;align-items:center;gap:5px;font-size:15px;font-weight:500;}
.tmr.warn{color:var(--amber);}.tmr.dng{color:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.ebar{background:var(--red-light);border:1px solid var(--red);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;color:var(--red-dark);display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;}
.dots{display:flex;gap:3px;flex-wrap:wrap;}
.dot{width:11px;height:11px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);}.dot.w{background:var(--red);border-color:var(--red);}
/* HOME */
.hero{text-align:center;padding:1.25rem 0 1rem;}
.hero-pills{display:flex;gap:16px;justify-content:center;margin-top:.625rem;font-size:13px;color:var(--text2);font-weight:500;}
.sr-overview{background:var(--bg2);border-radius:var(--radius);padding:.875rem 1.125rem;margin-bottom:.875rem;}
.sr-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:.5rem;}
.sr-stat{text-align:center;}.sr-stat .v{font-size:19px;font-weight:500;color:var(--text);}.sr-stat .l{font-size:10px;color:var(--text2);}
.due-banner{background:var(--amber-light);border:1.5px solid var(--amber);border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:.875rem;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;}
.due-banner:active{background:#f0d5b0;}
.mode-list{display:grid;gap:9px;}
.mc{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;}
.mc:active{background:var(--bg2);}
.mi{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.mt{font-weight:500;font-size:15px;color:var(--text);}.ms{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4;}
.bdg{font-size:10px;font-weight:500;border-radius:99px;padding:2px 8px;margin-left:5px;}
.bdg-p{background:var(--purple-light);color:var(--purple-dark);}.bdg-r{background:var(--red-light);color:var(--red-dark);}.bdg-a{background:var(--amber-light);color:#633806;}.bdg-b{background:#e6f1fb;color:#0c447c;}.bdg-g{background:#eaf3de;color:#27500a;}.bdg-t{background:#e1f5ee;color:#085041;}
/* PERSIST */
.persist-box{background:var(--bg2);border-radius:var(--radius);padding:.875rem 1.125rem;margin-top:1rem;}
.persist-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:.5rem;}
.persist-btn{background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius-sm);padding:.625rem;text-align:center;cursor:pointer;font-size:14px;font-weight:500;color:var(--text);transition:border-color .15s;}
.persist-btn:active{border-color:var(--purple);color:var(--purple);}
/* RESULT */
.result-screen{text-align:center;padding:.5rem 0;}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.125rem;}
.sc{background:var(--bg2);border-radius:var(--radius-sm);padding:.875rem;text-align:center;}
.sc .sv{font-size:22px;font-weight:500;color:var(--text);}.sc .sl{font-size:11px;color:var(--text2);margin-top:2px;}
.radar-wrap{text-align:left;margin-bottom:1.25rem;}
.radar-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:.625rem;}
.domain-bars{display:grid;gap:9px;}
.db-row{display:grid;grid-template-columns:95px 1fr 38px;align-items:center;gap:8px;font-size:13px;}
.db-label{color:var(--text2);text-align:right;font-size:12px;}.db-track{background:var(--bg2);border-radius:99px;height:12px;overflow:hidden;}.db-fill{height:12px;border-radius:99px;transition:width .7s ease;}.db-pct{color:var(--text);font-weight:500;font-size:12px;}
/* REVIEW */
.rev-section{text-align:left;margin-bottom:1.25rem;}
.rev-hd{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:.625rem;}
.rev-item{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:7px;font-size:13px;}
.rq{font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.4;}.ra{color:var(--green-dark);margin-bottom:2px;}.ry{color:var(--red-dark);margin-bottom:2px;}.rexp{color:var(--text2);font-size:12px;margin-top:4px;line-height:1.5;}
/* FAIL ANIMATION */
@keyframes failDrop{0%{transform:translateY(-50px) scale(1.4);opacity:0}60%{transform:translateY(8px) scale(.93)}80%{transform:translateY(-4px) scale(1.03)}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-10px)}20%,40%,60%,80%{transform:translateX(10px)}}
@keyframes slideUp{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes rainDrop{0%{transform:translateY(-10px);opacity:0}15%{opacity:1}100%{transform:translateY(80px);opacity:0}}
.fail-screen{text-align:center;padding:1rem 0;}
.fail-icon{font-size:72px;line-height:1;display:block;animation:failDrop .65s cubic-bezier(.36,.07,.19,.97) both;}
.fail-shake{display:inline-block;animation:shake .55s cubic-bezier(.36,.07,.19,.97) both .75s;}
.fail-title{font-size:26px;font-weight:500;color:var(--red);animation:slideUp .4s ease both .95s;opacity:0;margin-top:.75rem;}
.fail-sub{font-size:14px;color:var(--text2);line-height:1.55;animation:slideUp .4s ease both 1.15s;opacity:0;margin-top:.375rem;margin-bottom:1.25rem;}
.fail-stats{animation:slideUp .4s ease both 1.35s;opacity:0;}
.fail-actions{animation:slideUp .4s ease both 1.55s;opacity:0;margin-top:1rem;}
.fail-rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9990;overflow:hidden;}
.rain-drop{position:absolute;animation:rainDrop 1.8s ease-in infinite;}
/* CONFETTI */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9989;}
/* TOAST */
.toast{position:fixed;top:calc(var(--safe-top) + 12px);right:12px;background:#ffd900;color:#7a5f00;border-radius:99px;padding:7px 16px;font-weight:500;font-size:13px;animation:tpop .35s ease;pointer-events:none;z-index:9999;}
@keyframes tpop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.badge-toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%);background:var(--bg);border:1.5px solid #ffd900;border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;gap:10px;animation:bpop .4s ease;pointer-events:none;z-index:9999;min-width:240px;}
@keyframes bpop{0%{transform:translateX(-50%) scale(.4);opacity:0}70%{transform:translateX(-50%) scale(1.05)}100%{transform:translateX(-50%) scale(1);opacity:1}}
/* HISTORY */
.hist-empty{text-align:center;padding:3rem 0;color:var(--text2);font-size:15px;line-height:2;}
.hist-item{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:.875rem 1.125rem;margin-bottom:.75rem;}
.hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;}
.trend-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:1rem;}
.trend-card{background:var(--bg2);border-radius:var(--radius-sm);padding:.625rem;text-align:center;}
.trend-card .tv{font-size:17px;font-weight:500;color:var(--text);}.trend-card .tl{font-size:10px;color:var(--text2);margin-top:1px;}
/* BOOKMARKS */
.bm-item{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:.875rem 1.125rem;margin-bottom:.75rem;}
.bm-q{font-size:14px;font-weight:500;color:var(--text);margin-bottom:.375rem;line-height:1.45;}
.bm-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.bm-ans{font-size:12px;color:var(--green-dark);}.bm-remove{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text3);margin-left:auto;padding:2px 6px;border-radius:4px;}
/* FORMULA */
.formula-cat{margin-bottom:1.25rem;}
.fcat-hd{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.04em;}
.formula-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:.875rem 1.125rem;margin-bottom:.625rem;cursor:pointer;transition:border-color .15s;}
.formula-card.open{border-color:var(--purple);}
.fc-top{display:flex;align-items:center;justify-content:space-between;}
.fc-name{font-size:14px;font-weight:500;color:var(--text);}
.fc-formula{font-size:15px;font-weight:500;color:var(--purple);font-family:monospace;margin:.375rem 0 0;}
.fc-body{margin-top:.625rem;padding-top:.625rem;border-top:.5px solid var(--border);}
.fc-example{background:var(--bg2);border-radius:var(--radius-sm);padding:.625rem .875rem;font-size:13px;color:var(--text2);line-height:1.6;margin-top:.5rem;}
.fc-tip{font-size:12px;color:var(--purple);margin-top:.5rem;}
/* GLOSSARY */
.gloss-controls{display:flex;gap:6px;margin-bottom:.875rem;flex-wrap:wrap;}
.gloss-filter{font-size:12px;font-weight:500;border-radius:99px;padding:5px 12px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;}
.gloss-filter.active{border-color:var(--purple);background:var(--purple-light);color:var(--purple-dark);}
.gloss-progress{background:var(--bg2);border-radius:var(--radius-sm);padding:.625rem 1rem;margin-bottom:.875rem;display:flex;align-items:center;justify-content:space-between;font-size:13px;}
.flip-card{perspective:800px;margin-bottom:.75rem;cursor:pointer;}
.flip-inner{position:relative;width:100%;transition:transform .45s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-front,.flip-back{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);padding:1.125rem 1.25rem;border:.5px solid var(--border);}
.flip-front{background:var(--bg);min-height:90px;}
.flip-back{background:var(--purple-light);border-color:var(--purple);position:absolute;top:0;left:0;width:100%;transform:rotateY(180deg);min-height:90px;}
.flip-term{font-size:17px;font-weight:500;color:var(--text);margin-bottom:.25rem;}
.flip-cat{font-size:11px;color:var(--text3);}
.flip-hint{font-size:12px;color:var(--text3);margin-top:.5rem;}
.flip-def{font-size:14px;line-height:1.6;color:var(--purple-dark);font-weight:500;}
.flip-example{font-size:12px;color:var(--purple);margin-top:.5rem;line-height:1.5;}
/* GLOSSARY QUIZ */
.gloss-mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.gloss-mode-tab{background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--radius);padding:.875rem;text-align:center;cursor:pointer;transition:all .15s;}
.gloss-mode-tab:active,.gloss-mode-tab.active{border-color:var(--purple);background:var(--purple-light);}
.gloss-mode-icon{font-size:24px;margin-bottom:.375rem;}
.gloss-mode-title{font-size:14px;font-weight:500;color:var(--text);}
.gloss-mode-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.gloss-quiz-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:1.5rem 1.25rem;margin-bottom:1rem;text-align:center;}
.gloss-quiz-term{font-size:24px;font-weight:500;color:var(--text);margin-bottom:.375rem;}
.gloss-quiz-sub{font-size:12px;color:var(--text2);}
.gloss-quiz-opts{display:grid;gap:9px;margin-bottom:.875rem;}
.gloss-quiz-opt{background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--radius);padding:13px 14px;text-align:left;font-size:14px;color:var(--text);cursor:pointer;transition:border-color .12s,background .12s;line-height:1.5;-webkit-appearance:none;}
.gloss-quiz-opt:active:not(:disabled):not(.gcor):not(.ginc):not(.gsel){background:var(--bg2);}
.gloss-quiz-opt.gsel{border-color:var(--purple);background:var(--purple-light);color:var(--purple-dark);font-weight:500;}
.gloss-quiz-opt.gcor{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:500;}
.gloss-quiz-opt.ginc{border-color:var(--red);background:var(--red-light);color:var(--red-dark);}
.gloss-quiz-opt:disabled{cursor:default;}
/* ACHIEVEMENTS */
.ach-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1rem;}
.ach-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:.875rem;text-align:center;}
.ach-card.earned{border-color:#ffd900;background:#fffbe6;}
.ach-card.locked{opacity:.5;}
.ach-icon{font-size:32px;margin-bottom:.375rem;line-height:1;}
.ach-name{font-size:13px;font-weight:500;color:var(--text);}
.ach-desc{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4;}
.ach-earned-tag{font-size:10px;font-weight:500;background:#ffd900;color:#7a5f00;border-radius:99px;padding:2px 8px;margin-top:4px;display:inline-block;}
.ach-progress{font-size:10px;color:var(--text3);margin-top:3px;}
/* FLAG BUTTON */
.flag-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:2px 6px;border-radius:6px;line-height:1;}
/* NAV */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:.5px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100;}
.nav-btn{flex:1;padding:.625rem .1rem .5rem;text-align:center;cursor:pointer;border:none;background:none;color:var(--text2);font-size:9px;font-weight:500;transition:color .15s;}
.nav-btn.active{color:var(--purple);}.nav-btn .ni{font-size:20px;display:block;line-height:1;margin-bottom:2px;}
/* RADAR */
.radar-chart-wrap{position:relative;width:100%;height:240px;margin-bottom:.5rem;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="fail-rain" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9990;overflow:hidden;display:none;"></div>
<div id="app"></div>
<div class="nav-bar">
  <button class="nav-btn active" id="nav-home" onclick="navTo('home')"><span class="ni">🏠</span>Home</button>
  <button class="nav-btn" id="nav-formulas" onclick="navTo('formulas')"><span class="ni">📐</span>Formulas</button>
  <button class="nav-btn" id="nav-glossary" onclick="navTo('glossary')"><span class="ni">📖</span>Glossary</button>

<script>
/* ── CONFETTI ── */
const confettiCanvas=document.getElementById('confetti-canvas');
const ctx2d=confettiCanvas.getContext('2d');
let confettiParticles=[];let confettiRunning=false;
const CC=['#8549ba','#58cc02','#ffd900','#ff4b4b','#1D9E75','#185fa5','#e07000','#f0e6ff'];
function launchConfetti(){
  confettiCanvas.width=window.innerWidth;confettiCanvas.height=window.innerHeight;
  confettiParticles=[];
  for(let i=0;i<180;i++){confettiParticles.push({x:Math.random()*confettiCanvas.width,y:-20-Math.random()*120,w:6+Math.random()*8,h:3+Math.random()*5,color:CC[Math.floor(Math.random()*CC.length)],vx:(Math.random()-.5)*4,vy:2+Math.random()*4,rot:Math.random()*360,rotV:(Math.random()-.5)*8,opacity:1});}
  confettiRunning=true;animateConfetti();setTimeout(()=>{confettiRunning=false;},4500);
}
function animateConfetti(){
  if(!confettiRunning){ctx2d.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);return;}
  ctx2d.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  confettiParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;p.vy+=0.08;if(p.y>confettiCanvas.height+20)p.opacity=Math.max(0,p.opacity-.05);ctx2d.save();ctx2d.globalAlpha=p.opacity;ctx2d.translate(p.x,p.y);ctx2d.rotate(p.rot*Math.PI/180);ctx2d.fillStyle=p.color;ctx2d.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx2d.restore();});
  requestAnimationFrame(animateConfetti);
}

/* ── FAIL RAIN ── */
function launchFailRain(){
  const rain=document.getElementById('fail-rain');
  rain.style.display='block';rain.innerHTML='';
  const emojis=['💧','☔','😢','📉','❌','😭','💔'];
  for(let i=0;i<30;i++){
    const d=document.createElement('div');d.className='rain-drop';
    d.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    d.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*20}%;animation-delay:${Math.random()*2}s;animation-duration:${1.4+Math.random()*.8}s;font-size:${16+Math.random()*14}px;position:absolute;animation:rainDrop 1.8s ease-in infinite;`;
    rain.appendChild(d);
  }
  setTimeout(()=>{rain.style.display='none';rain.innerHTML='';},5500);
}

/* ── DATA ── */
const GLOSSARY=[
  {term:"WBS",cat:"Scope",def:"Work Breakdown Structure — hierarchical decomposition of project scope into work packages.",example:"Project → Phase → Deliverable → Work Package"},
  {term:"Critical Path",cat:"Schedule",def:"Longest sequence of dependent activities. Determines the earliest possible project completion date.",example:"Any delay on the critical path delays the whole project."},
  {term:"Float / Slack",cat:"Schedule",def:"Amount of time an activity can be delayed without delaying the project end date. Critical path = zero float.",example:"Float = LS − ES or LF − EF"},
  {term:"EVM",cat:"Earned Value",def:"Earned Value Management — integrates scope, schedule, and cost to measure project performance objectively.",example:"Uses PV, EV, and AC to calculate CPI and SPI."},
  {term:"CPI",cat:"Earned Value",def:"Cost Performance Index = EV ÷ AC. Cost efficiency. CPI < 1 = over budget.",example:"EV=$40k, AC=$50k → CPI=0.80"},
  {term:"SPI",cat:"Earned Value",def:"Schedule Performance Index = EV ÷ PV. Schedule efficiency. SPI < 1 = behind schedule.",example:"EV=$40k, PV=$50k → SPI=0.80"},
  {term:"BAC",cat:"Earned Value",def:"Budget At Completion — total planned budget for the project.",example:"Project budgeted for $500k → BAC=$500k"},
  {term:"EAC",cat:"Earned Value",def:"Estimate At Completion = BAC ÷ CPI. Forecasts total project cost at current performance.",example:"BAC=$100k, CPI=0.80 → EAC=$125k"},
  {term:"TCPI",cat:"Earned Value",def:"To-Complete Performance Index = (BAC−EV)÷(BAC−AC). Efficiency needed on remaining work to meet BAC.",example:"TCPI > 1.0 = must work more efficiently than before."},
  {term:"Risk Register",cat:"Risk",def:"Document recording identified risks, probability, impact, owners, and planned responses.",example:"Living document updated at every risk review."},
  {term:"EMV",cat:"Risk",def:"Expected Monetary Value = Probability × Impact. Quantifies risk in dollar terms.",example:"30% × $100k = $30k EMV"},
  {term:"Contingency Reserve",cat:"Risk",def:"Budget for known unknown risks — identified risks that may or may not occur.",example:"Distinct from management reserve (unknown unknowns)."},
  {term:"Monte Carlo",cat:"Risk",def:"Simulation running thousands of iterations to model probability distribution of project outcomes.",example:"Used in quantitative risk analysis for schedule/cost."},
  {term:"Residual Risk",cat:"Risk",def:"Risk remaining after a risk response has been implemented. Must still be monitored.",example:"Distinct from secondary risk (which arises from the response)."},
  {term:"Secondary Risk",cat:"Risk",def:"A new risk that arises as a direct result of implementing a risk response.",example:"Fast-tracking creates a rework risk."},
  {term:"RACI",cat:"Governance",def:"Responsibility Assignment Matrix: Responsible, Accountable, Consulted, Informed. Only one Accountable per task.",example:"Used to clarify roles across deliverables and decisions."},
  {term:"CCB",cat:"Governance",def:"Change Control Board — group that reviews, approves, or rejects change requests.",example:"All scope changes go through the CCB."},
  {term:"Integrated Change Control",cat:"Governance",def:"Process of reviewing all change requests and managing changes to baselines before implementation.",example:"No change implemented without this process."},
  {term:"PMO",cat:"Governance",def:"Project Management Office — standardizes governance, provides templates, training, and oversight.",example:"Can be supportive, controlling, or directive."},
  {term:"Project Charter",cat:"Integration",def:"Formally authorizes a project and gives the PM authority to apply resources. Signed by sponsor.",example:"Output of Develop Project Charter process."},
  {term:"Lessons Learned",cat:"Integration",def:"Knowledge gained during a project, documented and stored in organizational process assets for future use.",example:"Captured throughout; finalized at project closure."},
  {term:"OPA",cat:"Integration",def:"Organizational Process Assets — templates, policies, procedures, historical data, and lessons learned.",example:"Inputs to most planning processes."},
  {term:"EEF",cat:"Integration",def:"Enterprise Environmental Factors — conditions that influence but aren't controlled by the team.",example:"Market conditions, regulations, company culture."},
  {term:"Stakeholder Register",cat:"Stakeholders",def:"Identifies stakeholders and records their interests, involvement, and potential impact.",example:"Updated as new stakeholders are identified."},
  {term:"Power/Interest Grid",cat:"Stakeholders",def:"Maps stakeholders by authority (power) and concern (interest) to guide engagement strategy.",example:"High power/Low interest → Keep Satisfied."},
  {term:"Servant Leadership",cat:"People",def:"Leadership style prioritizing team needs — removing obstacles, coaching, enabling high performance.",example:"The Scrum Master exemplifies servant leadership."},
  {term:"Tuckman's Stages",cat:"People",def:"Five team development stages: Forming, Storming, Norming, Performing, Adjourning.",example:"Teams must resolve Storming to reach Performing."},
  {term:"Emotional Intelligence",cat:"People",def:"Ability to recognize, understand, and manage your own emotions and those of others.",example:"Self-awareness, empathy, and social skills."},
  {term:"Conflict Resolution",cat:"People",def:"Techniques for addressing disagreements. Collaborating (win-win) is most effective; avoiding is least.",example:"Modes: Collaborating, Compromising, Forcing, Smoothing, Avoiding."},
  {term:"Maslow's Hierarchy",cat:"People",def:"Physiological → Safety → Social → Esteem → Self-actualization. Lower needs must be met first.",example:"Used to understand what motivates team members."},
  {term:"Herzberg's Theory",cat:"People",def:"Hygiene factors (salary, conditions) prevent dissatisfaction. Motivators (achievement, growth) drive satisfaction.",example:"A raise won't motivate — it only prevents dissatisfaction."},
  {term:"Theory X / Theory Y",cat:"People",def:"McGregor: X assumes workers are lazy and need control. Y assumes workers are self-motivated.",example:"Theory Y aligns with modern PM and agile practices."},
  {term:"Benefits Realization",cat:"Business Environment",def:"Ensuring project outcomes deliver expected business benefits, tracked beyond project closure.",example:"Benefits owner monitors value delivery post-project."},
  {term:"Business Case",cat:"Business Environment",def:"Justifies project investment with expected benefits, costs, risks, and strategic alignment. A living document.",example:"Updated at key decision gates throughout the project."},
  {term:"Portfolio",cat:"Business Environment",def:"Projects, programs, and operations managed as a group to achieve strategic objectives.",example:"Portfolio management optimizes investment across all projects."},
  {term:"Benefits Owner",cat:"Business Environment",def:"Person accountable for ensuring expected business benefits are realized after project closure.",example:"Often a business leader, not the PM."},
  {term:"Product Backlog",cat:"Agile",def:"Ordered list of everything needed in the product, managed by the Product Owner.",example:"Top items are most refined and highest priority."},
  {term:"Sprint",cat:"Agile",def:"Fixed-length timebox (1–4 weeks) where the Scrum team creates a potentially releasable increment.",example:"Sprint timebox never changes mid-sprint."},
  {term:"Velocity",cat:"Agile",def:"Story points completed per sprint. Used for release planning — not for comparing teams.",example:"Average velocity over 3+ sprints is most reliable."},
  {term:"Definition of Done",cat:"Agile",def:"Shared understanding of what 'complete' means for a user story. Created by the Development Team.",example:"If it doesn't meet the DoD, it can't be accepted."},
  {term:"Kanban",cat:"Agile",def:"Framework visualizing work, limiting WIP, and using continuous flow rather than sprints.",example:"WIP limits prevent bottlenecks and multitasking."},
  {term:"Story Points",cat:"Agile",def:"Relative estimation unit capturing effort, complexity, and uncertainty — not time.",example:"A 5-point story is roughly 2.5x a 2-point story."},
  {term:"Retrospective",cat:"Agile",def:"Scrum ceremony at sprint end where team reflects on process and identifies improvements.",example:"Output: specific action items with owners and due dates."},
  {term:"WSJF",cat:"Agile",def:"Weighted Shortest Job First — SAFe prioritization dividing Cost of Delay by job duration.",example:"High CoD + short duration = top priority."},
  {term:"Lead Time",cat:"Agile",def:"Total time from work requested to delivered. Includes wait time.",example:"Lead time ≥ cycle time always."},
  {term:"Cycle Time",cat:"Agile",def:"Time from when work actively starts to delivery. Excludes wait time.",example:"Reducing cycle time improves flow efficiency."},
  {term:"MoSCoW",cat:"Agile",def:"Must have, Should have, Could have, Won't have. Prioritization framework for requirements.",example:"Used in backlog prioritization and scope planning."},
];

const ALL_Q=[
  {id:0,eco:"Process",tag:"Initiation",type:"factual",q:"A project manager is assigned to a new project. What should be done FIRST?",opts:["Create the project schedule","Identify stakeholders","Develop the WBS","Define project scope"],ans:1,exp:"Stakeholder identification happens before any planning — one of the first PMBOK initiation processes."},
  {id:1,eco:"Process",tag:"Sprint Planning",type:"factual",q:"During sprint planning the team has more work than capacity. Scrum Master should:",opts:["Tell the team to work overtime","Ask the PO to reprioritize","Remove items to match capacity","Extend the sprint duration"],ans:2,exp:"Remove items to match realistic capacity. Sprint timebox is sacred — never force overtime or extend it."},
  {id:2,eco:"Process",tag:"Risk",type:"factual",q:"A risk has 40% probability and $50,000 impact. EMV?",opts:["$50,000","$30,000","$20,000","$10,000"],ans:2,exp:"EMV = 0.40 × $50,000 = $20,000."},
  {id:3,eco:"Process",tag:"Earned Value",type:"factual",q:"BAC=$100k, EV=$40k, AC=$50k. CPI?",opts:["0.80","1.25","0.67","1.50"],ans:0,exp:"CPI = EV/AC = $40k/$50k = 0.80. Over budget."},
  {id:4,eco:"Process",tag:"Schedule",type:"factual",q:"Critical path activity delayed 5 days. Project end date?",opts:["Same","Delayed 5 days","Depends on float","Delayed up to 5 days"],ans:1,exp:"Critical path activities have zero float. Any delay shifts the end date by the same amount."},
  {id:5,eco:"Process",tag:"Communication",type:"factual",q:"A PM has 10 stakeholders. How many communication channels?",opts:["10","45","90","100"],ans:1,exp:"Channels = n(n-1)/2 = 10×9/2 = 45."},
  {id:6,eco:"Process",tag:"Quality",type:"factual",q:"Which tool identifies the most common causes of defects?",opts:["Control chart","Pareto diagram","Scatter diagram","Fishbone diagram"],ans:1,exp:"The Pareto diagram (80/20 rule) identifies the vital few causes responsible for most defects."},
  {id:7,eco:"Process",tag:"Procurement",type:"factual",q:"Which contract places most financial risk on the seller?",opts:["Cost Plus Fixed Fee","Time and Materials","Firm Fixed Price","Cost Plus Incentive Fee"],ans:2,exp:"Firm Fixed Price: seller bears all cost overrun risk."},
  {id:8,eco:"Process",tag:"Integration",type:"factual",q:"PRIMARY purpose of a project charter?",opts:["Define detailed requirements","Formally authorize the project","Allocate the budget","Assign team members"],ans:1,exp:"The charter formally authorizes the project and gives the PM authority to apply resources."},
  {id:9,eco:"Process",tag:"Risk",type:"factual",q:"Sharing risk with a third party is called:",opts:["Avoid","Mitigate","Transfer","Accept"],ans:2,exp:"Risk Transfer shifts the negative impact to a third party. It reassigns ownership, not eliminates the risk."},
  {id:10,eco:"Process",tag:"Earned Value",type:"factual",q:"SPI = 0.75 means:",opts:["25% ahead of schedule","25% behind schedule","75% complete","On schedule"],ans:1,exp:"SPI = EV/PV = 0.75 — $0.75 of planned work per $1.00 scheduled = 25% behind."},
  {id:11,eco:"Process",tag:"Schedule",type:"factual",q:"Float (slack) is defined as:",opts:["Total project duration","How long an activity can be delayed without delaying the project","Planned vs actual cost difference","Buffer added to estimates"],ans:1,exp:"Float = LS − ES. Critical path activities have zero float."},
  {id:12,eco:"Process",tag:"Earned Value",type:"factual",q:"BAC=$200k, CPI=0.80. EAC using current CPI?",opts:["$160,000","$200,000","$250,000","$240,000"],ans:2,exp:"EAC = BAC/CPI = $200k/0.80 = $250,000. Project expected to cost $50k more."},
  {id:13,eco:"Process",tag:"Scope",type:"factual",q:"Gold plating refers to:",opts:["Exceeding quality standards","Adding features beyond scope without authorization","Using premium vendors","Padding the budget"],ans:1,exp:"Gold plating = unrequested scope additions. Scope creep even when well-intentioned."},
  {id:14,eco:"Process",tag:"Risk",type:"factual",q:"A risk register PRIMARILY contains:",opts:["Project budget details","Identified risks and response plans","Team performance reviews","Stakeholder contacts"],ans:1,exp:"The risk register documents risks, probability, impact, owners, and response strategies."},
  {id:15,eco:"Process",tag:"Schedule",type:"factual",q:"Fast tracking means:",opts:["Adding more resources","Performing sequential activities in parallel","Removing non-critical activities","Reducing scope"],ans:1,exp:"Fast tracking overlaps phases normally done sequentially. Increases risk but compresses schedule."},
  {id:16,eco:"Process",tag:"Quality",type:"factual",q:"RACI stands for:",opts:["Responsible, Accountable, Consulted, Informed","Required, Available, Committed, Identified","Reviewed, Approved, Controlled, Initiated","Responsive, Active, Compliant, Involved"],ans:0,exp:"RACI: Responsible (does work), Accountable (owns outcome), Consulted (input), Informed (in loop)."},
  {id:17,eco:"Process",tag:"Risk",type:"factual",q:"Monte Carlo simulation is used to:",opts:["Identify stakeholder risks","Model schedule/cost uncertainty probabilistically","Create the risk register","Develop the WBS"],ans:1,exp:"Monte Carlo runs thousands of simulations to model the probability distribution of project outcomes."},
  {id:18,eco:"Process",tag:"Earned Value",type:"factual",q:"TCPI > 1.0 means:",opts:["Project is under budget","Future work must be done more efficiently than planned","Project will finish early","Future work can be less efficient"],ans:1,exp:"TCPI > 1.0 = remaining work must be more efficient than originally planned."},
  {id:19,eco:"Process",tag:"Schedule",type:"factual",q:"Resource leveling typically results in:",opts:["Shorter schedule","Longer schedule","Reduced project cost","Increased scope"],ans:1,exp:"Resource leveling smooths resource usage by delaying activities, often extending the schedule."},
  {id:20,eco:"Process",tag:"Earned Value",type:"factual",q:"EV=$60k, PV=$80k, AC=$55k. Schedule Variance (SV)?",opts:["+$20k","-$20k","+$5k","-$5k"],ans:1,exp:"SV = EV − PV = $60k − $80k = −$20k. Negative = behind schedule."},
  {id:21,eco:"Process",tag:"Scope",type:"factual",q:"Customer requests out-of-scope change. PM does FIRST?",opts:["Implement immediately","Reject the change","Submit a change request","Inform the sponsor"],ans:2,exp:"All changes go through Integrated Change Control starting with a formal change request — no matter how small."},
  {id:22,eco:"Process",tag:"Quality",type:"factual",q:"Control chart shows points outside control limits. This indicates:",opts:["Normal process variation","Process is in control","Assignable (special) cause variation","Random variation only"],ans:2,exp:"Points outside control limits signal assignable cause variation — investigate and apply corrective action."},
  {id:23,eco:"Process",tag:"Procurement",type:"factual",q:"An RFP solicits:",opts:["Work definitions only","Detailed vendor proposals","Cost estimates only","Team assignments"],ans:1,exp:"An RFP (Request for Proposal) asks vendors how they'll accomplish the work and at what cost."},
  {id:24,eco:"Process",tag:"Stakeholders",type:"factual",q:"Stakeholder has HIGH power but LOW interest. Strategy?",opts:["Manage closely","Keep informed","Keep satisfied","Monitor"],ans:2,exp:"High power/Low interest = Keep Satisfied. They have authority but aren't engaged — keep them happy."},
  {id:25,eco:"People",tag:"Team Development",type:"factual",q:"Tuckman's team development stages in correct order:",opts:["Forming, Norming, Storming, Performing","Forming, Storming, Norming, Performing, Adjourning","Storming, Forming, Norming, Performing","Forming, Performing, Storming, Norming"],ans:1,exp:"Forming → Storming → Norming → Performing → Adjourning. Teams must resolve Storming to reach peak performance."},
  {id:26,eco:"People",tag:"Leadership",type:"factual",q:"Which conflict resolution mode is generally MOST effective?",opts:["Avoiding","Forcing","Smoothing","Collaborating (problem solving)"],ans:3,exp:"Collaborating creates the most durable resolutions by addressing root causes. Avoiding is generally least effective."},
  {id:27,eco:"People",tag:"Motivation",type:"factual",q:"According to Herzberg, which is a MOTIVATOR (not a hygiene factor)?",opts:["Salary","Job security","Achievement and recognition","Working conditions"],ans:2,exp:"Motivators (achievement, recognition, growth) drive actual satisfaction. Hygiene factors (salary, security) only prevent dissatisfaction."},
  {id:28,eco:"People",tag:"Leadership",type:"factual",q:"A servant leader PRIMARILY:",opts:["Directs team tasks","Sets all priorities","Enables and empowers the team","Reports to senior management"],ans:2,exp:"Servant leaders prioritize team needs — removing obstacles, coaching, and creating conditions for success."},
  {id:29,eco:"People",tag:"Communication",type:"factual",q:"Most effective communication method for complex sensitive issues:",opts:["Email","Written report","Face-to-face","Instant messaging"],ans:2,exp:"Face-to-face is most effective for complex or sensitive issues because it includes tone, body language, and immediate feedback."},
  {id:30,eco:"People",tag:"Team Development",type:"factual",q:"McGregor's Theory X assumes workers are:",opts:["Self-motivated and seek responsibility","Lazy and need close supervision","Driven by achievement","Creative problem solvers"],ans:1,exp:"Theory X: workers are lazy and must be controlled. Theory Y: self-motivated and seek responsibility. Theory Y aligns with modern PM."},
  {id:31,eco:"People",tag:"Virtual Teams",type:"factual",q:"The BIGGEST challenge for virtual project teams is:",opts:["Technology compatibility","Communication and trust building","Budget management","Schedule differences"],ans:1,exp:"Communication and trust building are the greatest virtual team challenges without face-to-face interaction."},
  {id:32,eco:"People",tag:"Emotional Intelligence",type:"factual",q:"Emotional intelligence in a PM PRIMARILY helps with:",opts:["Schedule compression","Stakeholder and team relationships","Cost estimation","Risk identification"],ans:1,exp:"Emotional intelligence — self-awareness, empathy, and social skills — directly improves relationships with stakeholders and team members."},
  {id:33,eco:"People",tag:"Motivation",type:"factual",q:"Maslow's hierarchy of needs from LOWEST to HIGHEST:",opts:["Safety, Physiological, Social, Esteem, Self-actualization","Physiological, Safety, Social, Esteem, Self-actualization","Social, Safety, Physiological, Self-actualization, Esteem","Esteem, Social, Safety, Physiological, Self-actualization"],ans:1,exp:"Physiological → Safety → Social → Esteem → Self-actualization. Lower needs must be met before higher ones motivate."},
  {id:34,eco:"People",tag:"Leadership",type:"factual",q:"Situational leadership means a PM should:",opts:["Always use the same leadership style","Adapt leadership style to team member's maturity and task","Let members choose their preferred style","Delegate all decisions to the team"],ans:1,exp:"Effective leaders adapt their style (directing, coaching, supporting, delegating) based on follower competence and commitment."},
  {id:35,eco:"People",tag:"Negotiation",type:"factual",q:"Win-win negotiation focuses on:",opts:["One party getting everything","Splitting the difference","Meeting underlying interests of both parties","Avoiding negotiation altogether"],ans:2,exp:"Win-win (integrative) negotiation focuses on underlying interests, not stated positions — finding solutions that satisfy both parties."},
  {id:36,eco:"People",tag:"Team Development",type:"factual",q:"'Storming' stage is characterized by:",opts:["Polite introductions and enthusiasm","Conflict, power struggles, and pushback","Smooth collaboration and high productivity","Wrapping up and disbanding"],ans:1,exp:"Storming = conflict phase. Team members challenge each other. Healthy teams work through it to reach Norming and Performing."},
  {id:37,eco:"People",tag:"Communication",type:"factual",q:"Active listening PRIMARILY involves:",opts:["Taking extensive notes","Responding immediately with solutions","Full attention, clarifying questions, and reflecting back","Preparing your response while the other person speaks"],ans:2,exp:"Active listening means full attention, no interrupting, reflecting back what was heard, and asking clarifying questions."},
  {id:38,eco:"People",tag:"Leadership",type:"factual",q:"Best leadership style for a new, inexperienced team member on a complex task:",opts:["Delegating","Supporting","Coaching","Directing"],ans:3,exp:"Directing is appropriate for low competence/high commitment. As competence grows: Coach → Support → Delegate."},
  {id:39,eco:"People",tag:"Conflict",type:"scenario",scenario:"Two senior developers have a heated technical disagreement about system architecture, ongoing for two weeks and slowing sprint progress. Both are highly skilled.",q:"BEST first approach?",opts:["Force a decision — pick one solution","Let them figure it out — they're seniors","Facilitate a structured technical discussion focused on project requirements and trade-offs","Escalate to the technical director"],ans:2,exp:"Collaborating is most effective. Facilitate a discussion focused on project needs and objective criteria — not personalities."},
  {id:40,eco:"People",tag:"Team Development",type:"scenario",scenario:"You take over a project mid-way. The team is disengaged, misses deadlines, barely communicates. The previous PM was autocratic and micromanaged everything.",q:"What do you do FIRST to rebuild team performance?",opts:["Set strict new deadlines immediately to signal accountability","Hold one-on-ones to understand each person's perspective and rebuild trust","Restructure the team completely","Report poor performance to senior management"],ans:1,exp:"Rebuilding trust through one-on-ones is the critical first step. Understand root causes before taking corrective action."},
  {id:41,eco:"People",tag:"Motivation",type:"scenario",scenario:"A high-performing team member feels unchallenged and bored. They haven't received a raise in two years and are considering leaving.",q:"According to Herzberg, what should you address FIRST?",opts:["Give them a raise immediately to prevent departure","Assign more challenging work and growth opportunities","Address both simultaneously","Let them decide on their own"],ans:1,exp:"Per Herzberg, growth and challenging work are motivators that drive engagement. The raise is a hygiene factor. Address the motivator first — then escalate compensation."},
  {id:42,eco:"People",tag:"Leadership",type:"scenario",scenario:"You are leading a team of highly experienced senior professionals with deep domain expertise who are highly self-motivated.",q:"Which leadership style is MOST appropriate?",opts:["Directing — you must maintain control","Coaching — they need guidance on approach","Supporting — provide encouragement when needed","Delegating — they are competent and committed"],ans:3,exp:"Situational leadership: high competence + high commitment = Delegating. Experienced, self-motivated professionals perform best with autonomy."},
  {id:43,eco:"Business Environment",tag:"Benefits Realization",type:"factual",q:"Benefits realization management focuses on:",opts:["Delivering project outputs on time","Ensuring outcomes deliver expected business benefits beyond project closure","Managing project costs","Identifying project risks"],ans:1,exp:"Benefits realization tracks whether intended business value is actually achieved — often measured months after project closure."},
  {id:44,eco:"Business Environment",tag:"Governance",type:"factual",q:"A business case PRIMARILY justifies:",opts:["The PM's authority","Project investment by outlining expected benefits, costs, risks, and strategic alignment","The project schedule","Resource requirements"],ans:1,exp:"The business case is the key document justifying project investment. It is a living document updated at key decision gates."},
  {id:45,eco:"Business Environment",tag:"Compliance",type:"factual",q:"Enterprise Environmental Factors (EEFs) are:",opts:["Policies created by the project team","External/internal conditions that influence but are not controlled by the project team","Tools used for project planning","Lessons learned from previous projects"],ans:1,exp:"EEFs include market conditions, regulations, organizational culture — factors the team must consider but cannot change."},
  {id:46,eco:"Business Environment",tag:"Strategy",type:"factual",q:"A project is BEST aligned to organizational strategy when:",opts:["It has the lowest cost","It delivers outputs that advance the organization's strategic objectives","It completes fastest","It has the fewest risks"],ans:1,exp:"Strategic alignment means the project's outcomes contribute to the organization's goals and priorities."},
  {id:47,eco:"Business Environment",tag:"Governance",type:"factual",q:"The project sponsor's PRIMARY role is to:",opts:["Manage day-to-day project activities","Champion the project, provide funding, and remove organizational obstacles","Approve all change requests","Assign team members"],ans:1,exp:"The sponsor owns the business case, funds the project, and uses organizational authority to remove impediments the PM cannot resolve."},
  {id:48,eco:"Business Environment",tag:"Compliance",type:"factual",q:"When a new regulation impacts your project, you should FIRST:",opts:["Ignore it — legal will handle it","Cancel the project","Assess the impact and update the risk register and change log","Immediately escalate to the board"],ans:2,exp:"Regulatory changes are external risks. Assess impact, update risk register, submit change requests if needed."},
  {id:49,eco:"Business Environment",tag:"Benefits Realization",type:"factual",q:"A project delivers all planned outputs but the business benefit is never realized. MOST likely because:",opts:["The PM made errors","The project was over budget","Outputs didn't lead to required outcomes and organizational adoption","The team was inexperienced"],ans:2,exp:"Outputs ≠ Outcomes ≠ Benefits. Technical delivery without adoption fails to generate value."},
  {id:50,eco:"Business Environment",tag:"Strategy",type:"factual",q:"During project closure, lessons learned PRIMARILY contribute to:",opts:["The project team's bonuses","Organizational Process Assets for future projects","The final project report only","Stakeholder satisfaction"],ans:1,exp:"Lessons learned are stored as OPAs — institutional knowledge that improves future project performance."},
  {id:51,eco:"Business Environment",tag:"Benefits Realization",type:"scenario",scenario:"Your project delivered a new CRM system on time, on budget, meeting all technical requirements. Six months after launch, customer satisfaction hasn't improved and the sales team rarely uses it.",q:"What was MOST likely missing from the project approach?",opts:["Better project management","Stronger technical requirements","Change management and user adoption planning","More budget"],ans:2,exp:"Technical delivery without change management fails to realize benefits. Adoption planning, training, and stakeholder engagement are essential."},
  {id:52,eco:"Business Environment",tag:"Governance",type:"scenario",scenario:"Halfway through your project, the organization announces a major strategic shift. Your project's deliverables now have limited alignment with the new strategy. The sponsor still wants to continue.",q:"What should the PM do?",opts:["Continue as planned — the sponsor wants to proceed","Immediately cancel the project","Re-evaluate the business case in light of the new strategy and present findings to leadership","Reduce the project scope to save money"],ans:2,exp:"When strategy changes, re-evaluate the business case. Present continuation, pivot, or termination options to leadership — don't decide unilaterally."},
  {id:53,eco:"Process",tag:"Scope",type:"scenario",scenario:"Three months into a 12-month project. A senior stakeholder informally requests an additional module not in scope, insisting it's small and needs no formal approval.",q:"What do you do FIRST?",opts:["Add it — stakeholder is senior","Reject — not in scope","Log it as a change request and submit to the CCB","Estimate effort before deciding"],ans:2,exp:"All scope changes must go through Integrated Change Control with a formal change request — no matter how small."},

/* ── SR ENGINE ── */
function getSRDue(sr){const now=Date.now();return ALL_Q.filter(q=>{const r=sr[q.id];return r&&r.due<=now;});}
function getSRQueue(sr,count){
  const now=Date.now();
  const scored=ALL_Q.map(q=>{const r=sr[q.id]||{interval:0,ef:2.5,due:0,wrong:0};return{q,overdue:now-r.due,isNew:!sr[q.id],wrong:r.wrong||0};});
  scored.sort((a,b)=>{if(a.isNew!==b.isNew)return a.isNew?1:-1;if(b.wrong!==a.wrong)return b.wrong-a.wrong;return b.overdue-a.overdue;});
  return scored.slice(0,count).map(s=>s.q);
}
function updateSR(sr,qid,correct){
  const r=sr[qid]||{interval:0,ef:2.5,due:0,wrong:0};
  if(correct){r.interval=r.interval===0?1:r.interval===1?3:Math.round(r.interval*r.ef);r.ef=Math.max(1.3,r.ef+0.1);r.due=Date.now()+r.interval*86400000;}
  else{r.interval=0;r.ef=Math.max(1.3,r.ef-0.2);r.due=Date.now()+3600000;r.wrong=(r.wrong||0)+1;}
  sr[qid]=r;return sr;
}
function getSRStats(sr){return{seen:Object.keys(sr).length,mastered:Object.values(sr).filter(r=>r.interval>=7).length,dueNow:getSRDue(sr).length};}
function weightedShuffle(qs,sr){
  const now=Date.now();
  return qs.map(q=>{const r=sr[q.id];let w=1;if(!r)w=2;else if(r.wrong>1)w=5;else if(r.interval<3)w=3;else if(r.due<=now)w=4;return{q,sort:Math.random()*w};}).sort((a,b)=>b.sort-a.sort).map(x=>x.q);
}

/* ── ACHIEVEMENTS ── */
function checkAchievements(stats){
  const n=[];
  ACHIEVEMENTS.forEach(a=>{if(!stats.earnedAchievements.includes(a.id)&&a.check(stats)){stats.earnedAchievements.push(a.id);n.push(a);}});
  return n;
}

/* ── GLOSSARY QUIZ ── */
function buildGlossaryQuiz(filterCat){
  const pool=filterCat==='All'?[...GLOSSARY]:GLOSSARY.filter(g=>g.cat===filterCat);
  if(pool.length<4)return null;
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  return shuffled.slice(0,Math.min(15,pool.length)).map(g=>{
    const wrong=[...pool].filter(x=>x.term!==g.term).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.def);
    const opts=[g.def,...wrong].sort(()=>Math.random()-.5);
    return{term:g.term,cat:g.cat,def:g.def,opts,ans:opts.indexOf(g.def)};
  });
}

  render();
}

function startSR(){const qs=weightedShuffle(getSRQueue(S.sr,20),S.sr);if(!qs.length){showToast('No questions available.');return;}startMode('sr',qs);}
function startDueNow(){const due=getSRDue(S.sr);if(!due.length){showToast('Nothing due right now!');return;}startMode('due',weightedShuffle(due,S.sr));}

}

function check(){
  if(S.selected===null||S.answered)return;
  S.answered=true;
  const q=S.questions[S.current];const ok=S.selected===q.ans;
  S.stats.totalAnswered=(S.stats.totalAnswered||0)+1;
  if(ok){
    S.correct++;if(S.domainStats[q.eco])S.domainStats[q.eco].correct++;
    S.stats.totalCorrect=(S.stats.totalCorrect||0)+1;
    if(S.mode!=='practice'){S.stats.xp=(S.stats.xp||0)+10;showToast('+10 XP');}
    if(q.type==='scenario')S.stats.scenarioCorrect=(S.stats.scenarioCorrect||0)+1;
    if(q.eco==='People')S.stats.peopleCorrect=(S.stats.peopleCorrect||0)+1;
    if(q.eco==='Business Environment')S.stats.bizCorrect=(S.stats.bizCorrect||0)+1;
  } else {
    S.wrong++;
    S.wrongItems.push({q:q.q,yourAns:q.opts[S.selected],correct:q.opts[q.ans],exp:q.exp,domain:q.eco});
    if(S.mode==='prep'&&S.wrong>MAX_WRONG){stopTimer();S.failed=true;S.failReason='wrong';S.sr=updateSR(S.sr,q.id,false);saveSR(S.sr);saveSession();render();return;}
  }
  S.sr=updateSR(S.sr,q.id,ok);saveSR(S.sr);checkAndAward();render();
}
function next(){if(S.current<S.questions.length-1){S.current++;S.selected=null;S.answered=false;render();}else{stopTimer();saveSession();S.screen='result';render();}}

function saveSession(){
  const total=S.questions.length;const pct=Math.round((S.correct/total)*100);
  const elapsed=isFinite(S.startTime)?Math.round((Date.now()-S.startTime)/1000):0;
  const passed=S.mode==='prep'?!S.failed:pct>=70;
  S.stats.totalSessions=(S.stats.totalSessions||0)+1;
  if(S.mode==='prep'&&passed)S.stats.prepPassed=(S.stats.prepPassed||0)+1;
  if(passed&&pct===100&&S.mode==='practice')S.stats.perfectSessions=(S.stats.perfectSessions||0)+1;

  S.stats.mastered=Object.values(S.sr).filter(r=>r.interval>=7).length;
  S.history.unshift({date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),mode:S.mode,pct,correct:S.correct,total,wrong:S.wrong,elapsed:fmt(elapsed),passed,domainStats:JSON.parse(JSON.stringify(S.domainStats))});
  saveHistory(S.history);checkAndAward();saveStats(S.stats);

}

  const ds=S.domainStats;
  const bars=ECO_DOMAINS.map(d=>{const r=ds[d]||{correct:0,total:0};const p=r.total>0?Math.round((r.correct/r.total)*100):0;return`<div class="db-row"><div class="db-label">${d.split(' ')[0]}</div><div class="db-track"><div class="db-fill" style="width:${p}%;background:${DOMAIN_COLORS[d]}"></div></div><div class="db-pct">${p}%</div></div>`;}).join('');
  const review=S.wrongItems.length>0?`<div class="rev-section" style="text-align:left"><div class="rev-hd">Your ${S.wrongItems.length} incorrect answers</div>${S.wrongItems.slice(0,6).map(it=>`<div class="rev-item"><div class="rq">${it.q}</div><div class="ry">✗ ${it.yourAns}</div><div class="ra">✓ ${it.correct}</div><div class="rexp">${it.exp}</div></div>`).join('')}${S.wrongItems.length>6?`<div style="font-size:12px;color:var(--text3);text-align:center;padding:.5rem">+${S.wrongItems.length-6} more — focus on these areas</div>`:''}</div>`:'';
  setTimeout(()=>drawRadar(ds),300);
  return`<div class="fail-screen">
<div><span class="fail-icon">😵</span><div class="fail-shake" style="display:none"></div></div>
<div class="fail-title">${isTimeout?'⏰ Time\'s up!':'❌ Exam failed'}</div>
<div class="fail-sub">${isTimeout?'You ran out of time. Aim to spend ~1.3 minutes per question.':'You exceeded '+MAX_WRONG+' wrong answers ('+S.wrong+' wrong). Study your weak areas and try again.'}</div>
<div class="fail-stats">
  <div class="srow"><div class="sc"><div class="sv">${S.correct}/${total}</div><div class="sl">Correct</div></div><div class="sc"><div class="sv" style="color:var(--red-dark)">${S.wrong}</div><div class="sl">Wrong (max ${MAX_WRONG})</div></div><div class="sc"><div class="sv">${pct}%</div><div class="sl">Score</div></div></div>
  <div class="radar-wrap" style="text-align:left;margin-bottom:1rem"><div class="radar-title">Domain performance — find your weak spots</div><div class="radar-chart-wrap"><canvas id="domainChart"></canvas></div><div class="domain-bars" style="margin-top:10px">${bars}</div></div>
  ${review}
</div>
<div class="fail-actions">
  <div class="btn-row">
    <button class="abtn red" onclick="startPrep()">Try again 💪</button>
    <button class="abtn pur" onclick="startSR()">Smart review first 🧠</button>
    <button class="abtn out" onclick="goHome()">Back to home</button>
  </div>
</div>
</div>`;
}

/* ── RENDER RESULT ── */
function renderResult(){
  const total=S.questions.length;const pct=Math.round((S.correct/total)*100);
  const isPrep=S.mode==='prep';
  if(isPrep&&S.failed)return renderFail();
  const elapsed=isFinite(S.startTime)?Math.round((Date.now()-S.startTime)/1000):0;
  const timeUsed=isPrep?fmt(EXAM_MIN*60-S.timerSec):fmt(elapsed);
  const passed=isPrep?!S.failed:pct>=70;
  let icon,title,sub;
  if(isPrep&&passed){icon=pct>=85?'🏆':'✅';title='Exam passed! 🎉';sub=`${S.correct}/${total} correct, ${S.wrong} errors. Nicely done!`;}
  else if(S.mode==='due'){icon='⏰';title='Due cards cleared!';sub='Memory updated. Come back tomorrow for more.';}
  else if(S.mode==='sr'){icon='🧠';title='Review done!';sub='Cards updated. Come back tomorrow for the next batch.';}
  else if(S.mode==='scenario'){icon=pct>=70?'🎭':'📖';title=pct>=70?'Strong situational thinking!':'Keep practicing scenarios';sub=`${S.correct}/${total} scenario questions correct.`;}
  else if(S.mode==='people'){icon=pct>=70?'🤝':'📖';title=pct>=70?'People skills on point!':'Review leadership & motivation';sub=`${S.correct}/${total} People domain correct.`;}
  else if(S.mode==='biz'){icon=pct>=70?'🏢':'📖';title=pct>=70?'Business savvy!':'Review governance & benefits';sub=`${S.correct}/${total} Business Env correct.`;}
  else{icon=pct>=70?'🎉':'📖';title=pct>=70?'Nice work!':'Keep going!';sub=pct>=70?'Good understanding — keep building.':'Review the explanations and practice more.';}
  const ds=S.domainStats;
  const bars=ECO_DOMAINS.map(d=>{const r=ds[d]||{correct:0,total:0};const p=r.total>0?Math.round((r.correct/r.total)*100):0;return`<div class="db-row"><div class="db-label">${d.split(' ')[0]}</div><div class="db-track"><div class="db-fill" style="width:${p}%;background:${DOMAIN_COLORS[d]}"></div></div><div class="db-pct">${p}%</div></div>`;}).join('');
  const review=S.wrongItems.length>0?`<div class="rev-section"><div class="rev-hd">Review: ${S.wrongItems.length} incorrect answer${S.wrongItems.length>1?'s':''}</div>${S.wrongItems.map(it=>`<div class="rev-item"><div class="rq">${it.q}</div><div class="ry">✗ ${it.yourAns}</div><div class="ra">✓ ${it.correct}</div><div class="rexp">${it.exp}</div></div>`).join('')}</div>`:`<div style="text-align:center;padding:.75rem;color:var(--green-dark);font-size:14px;margin-bottom:1rem">🎯 No incorrect answers — perfect!</div>`;
  const st=getSRStats(S.sr);
  setTimeout(()=>drawRadar(ds),150);
  return`<div class="result-screen">
<div style="font-size:56px;margin-bottom:.625rem">${icon}</div>
<div style="font-size:22px;font-weight:500;color:${passed?'var(--green-dark)':'var(--amber)'};margin-bottom:.25rem">${title}</div>
<div style="font-size:14px;color:var(--text2);margin-bottom:1.125rem;line-height:1.5">${sub}</div>
<div class="srow"><div class="sc"><div class="sv">${S.correct}/${total}</div><div class="sl">Correct</div></div><div class="sc"><div class="sv">${S.wrong}</div><div class="sl">Wrong</div></div><div class="sc"><div class="sv">${timeUsed}</div><div class="sl">Time</div></div></div>
<div class="radar-wrap"><div class="radar-title">ECO domain performance</div><div class="radar-chart-wrap"><canvas id="domainChart"></canvas></div><div class="domain-bars" style="margin-top:10px">${bars}</div></div>
${review}
<div class="btn-row">
  ${st.dueNow>0?`<button class="abtn amb" onclick="startDueNow()">Clear ${st.dueNow} due card${st.dueNow>1?'s':''} ⏰</button>`:''}
  ${isPrep?`<button class="abtn grn" onclick="startPrep()">New exam</button>`:''}
  ${S.mode==='scenario'?`<button class="abtn blue" onclick="startScenario()">More scenarios</button>`:''}
  ${S.mode==='people'?`<button class="abtn teal" onclick="startPeople()">More People Qs</button>`:''}
  ${S.mode==='biz'?`<button class="abtn teal" onclick="startBiz()">More Biz Env Qs</button>`:''}
  ${(S.mode==='sr'||S.mode==='due')?`<button class="abtn pur" onclick="startSR()">Smart review</button>`:''}
  <button class="abtn out" onclick="goHome()">Back to home</button>
</div></div>`;
}

/* ── MAIN RENDER ── */
function render(){
  const app=document.getElementById('app');
  if(S.screen==='quiz'){app.innerHTML=renderQuiz();return;}
  if(S.screen==='formulas'){app.innerHTML=renderFormulas();return;}
  if(S.screen==='glossary'){app.innerHTML=renderGlossary();return;}
  if(S.screen==='history'){app.innerHTML=renderHistory();return;}
  if(S.screen==='achievements'){app.innerHTML=renderAchievements();return;}
  if(S.screen==='bookmarks'){app.innerHTML=renderBookmarks();return;}
  if(S.screen==='result'){app.innerHTML=renderResult();setTimeout(()=>drawRadar(S.domainStats),200);return;}
  app.innerHTML=renderHome();
}

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
render();
</script>
</body>
</html>
